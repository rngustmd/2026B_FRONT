<!DOCTYPE html>
<html lang='en'>
<head>
    
    <link rel='stylesheet' href='main.css'> <!-- css -->

    <!-- CSS 방법2 -->
     <style>
        h4{ color : blue ; } 
     </style>

     <!-- CSS 방법3--> 
      <link href="exam01.css" rel="styleSheet" />
</head>
<body>
    <!-- 
        HTML : 이동가능한 텍스트 마크업 언어                                    EX] 뼈대
        CSS : Cascading ( 위에서 아래로 흐름 ) Style ( 꾸미기 ) Sheet ( 덮는 )  EX] 옷
            -> 위에서 아래로 (HTML/XML) 꾸미기 시트 덮는다
        JS : 자바스크립트 프로그래밍 언어                                       EX] 동적(이벤트)
    -->
    <!-- CSS 적용하는 방법1 : 인라인( 마크업 내 style 속성 이용 ) -->
    <h3 style=" color:red;">  CSS방법1 </h3> <!-- h3 마크업 -->
    <!-- CSS 적용하는 방법2 : <head> 마크업 내 <style> 마크업 문법 사용 -->
    <h4> CSS방법2 </h4>
    <!-- CSS 적용하는 방법3 : .css 파일 내 css 문법 작성하고 <head> 마크업에서 호출 -->
    <h5> CSS방법3 </h5>
    
    <h6> CSS선택자 </h6>
    <h6 class = "구역1"> CSS선택자2 </h6>
    <h6 id = "구역2"> CSS선택자3 </h6>

    <!-- 주의할점 : 하위요소 마크업 작성시 tap탭 사용 -->
    <div>
        <!-- 상위요소 body , 하위요소 : h3 , ol , li -->
         <h3> 학생명단 </h3> <!-- 상위요소 div , 하위요소 X -->
         <ol> <!-- 상위요소 div , 하위요소 li -->
            <li id="이름1"> 유재석 </li> <!-- 상위요소 ol , 하위요소 X -->
            <li> 
                <h3> 강호동 </h3>
            </li>
         </ol>

    </div>

    <h2> CSS 텍스트 주요 속성 </h2>
    <h1 class="title"> 강아지 </h1>
    <div class="본문구역">
        기본적으로는 개 + 작다는 뜻의 접두어 앚 + 명사화 접사 "이"가 합쳐져서 강아지가 됐다.
        기본적으로, 개의 새끼, 즉 어린 개를 뜻한다.
        어린 자식이나 손주를 부르는 말로도 쓰며, 특히 노인이 손주에게 '강아지'라고 부르는 경우가 많다. 
        개중에는 손주가 성인이 되어서까지도 '강아지'라 불리기도 한다.
    </div>
    <p class="작성자"> 위키백과 </p>
</body>
</html>
