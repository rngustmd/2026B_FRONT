<!DOCTYPE html>
<html lang='en'>
<head>
    
    <link rel='stylesheet' href='main.css'> <!-- css -->

    <!-- CSS 방법2 -->
     <style>
        h4{ color : blue ; } 
     </style>

     <!-- CSS 방법3--> 
      <link href="exam01.css" rel="styleSheet" />
</head>
<body>
    <!-- 
        HTML : 이동가능한 텍스트 마크업 언어                                    EX] 뼈대
        CSS : Cascading ( 위에서 아래로 흐름 ) Style ( 꾸미기 ) Sheet ( 덮는 )  EX] 옷
            -> 위에서 아래로 (HTML/XML) 꾸미기 시트 덮는다
        JS : 자바스크립트 프로그래밍 언어                                       EX] 동적(이벤트)
    -->
    <!-- CSS 적용하는 방법1 : 인라인( 마크업 내 style 속성 이용 ) -->
    <h3 style=" color:red;">  CSS방법1 </h3> <!-- h3 마크업 -->
    <!-- CSS 적용하는 방법2 : <head> 마크업 내 <style> 마크업 문법 사용 -->
    <h4> CSS방법2 </h4>
    <!-- CSS 적용하는 방법3 : .css 파일 내 css 문법 작성하고 <head> 마크업에서 호출 -->
    <h5> CSS방법3 </h5>
    
    <h6> CSS선택자 </h6>
    <h6 class = "구역1"> CSS선택자2 </h6>
    <h6 id = "구역2"> CSS선택자3 </h6>

</body>
</html>
