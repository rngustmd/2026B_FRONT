<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='practice.css'>
</head>
<body>
    <div id="whole">
        <div id="right">
        <h3>사원 휴가 신청</h3>

        <div class="inputBox">
            <label>신청 사원</label>
            <select class="category">
                 <option value="" selected disabled>휴가 신청 사원을 선택하세요.</option>
            </select>
         </div>

            <div class="dateBox">
                <div class="inputBox">
                      <label>휴가 시작일</label>
                       <input class="vStart" type="date">
                </div>

                <div class="inputBox">
                     <label>휴가 종료일</label>
                     <input class="vEnd" type="date">
                </div>
            </div>

            <div class="inputBox">
                <label>휴가 사유</label>
                <input class="vReason" type="text" placeholder="예 : 여름 휴가">
            </div>

        <button class="btn" onclick="vaAdd()">신청</button>

    </div>
</div>

    <div id="right-bottom">
        
    <h3>휴가 신청 전체 목록</h3>
    <div class="vacationBox"></div>

      
        
    </div>
</div>




    <script src="practice.js"> </script>
</body>
</html>
