<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>

    <form>
         <label> 카테고리 </label> <br/>
         <select> <br/>
            <option> 공지사항   </option> <br/>
            <option> 자유게시판 </option> <br/>
            <option> 질문게시판 </option> <br/>
         </select> <br/>
         <hr />
         <input type="text" placeholder="작성자"> 
         <input type="password" placeholder="비밀번호"> 
         <hr />
         <input type="text" placeholder="게시물 제목 입력"> <br/>
         <hr />
         <textarea cols="80" rows="15" placeholder="게시물 내용입력"></textarea> <br/>
         <br/>
         공개선택
         <input type="radio" name="open" checked> 공개글 
         <input type="radio" name="open"> 비공개글
         <br/>
         공유선택
         <input type="checkbox"> 카카오톡
         <input type="checkbox"> 트위터
         <input type="checkbox"> 네이버카페
         <br/>
         작성일자 <input type="date">
         작성시간 <input type="time">
         <hr/>
         첨부파일 <input type="file">
         <hr/>
         <button type="button">목록보기</button>
         <button type="submit">글쓰기</button>
         <button type="reset">다시쓰기</button>
         
    </form>
</body>
</html>
